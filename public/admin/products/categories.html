<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="../">
    <title>Admin Categories - Drop2Wave</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../assets/logo.jpeg">
    <link href="../frontend/css/style.css" rel="stylesheet">
    <link href="../frontend/css/admin-theme.css" rel="stylesheet">
    <link href="../frontend/css/admin-pages.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid admin-shell">
        <div class="admin-layout">
            <aside class="side-nav">
                <div class="side-nav-inner">
                    <div class="side-top side-logo-wrap">
                        <img src="../assets/logo.jpeg" alt="Drop2Wave" class="side-logo">
                        <button type="button" class="sidebar-toggle d-none d-lg-inline-flex" id="sidebarToggle" aria-label="Collapse sidebar">
                            <i class="fas fa-bars"></i>
                        </button>
                    </div>

                    <div class="profile-card">
                        <div class="profile-avatar">A</div>
                        <div class="profile-text">
                            <div class="profile-name">Admin Super Admin</div>
                            <div class="profile-role">super-admin</div>
                        </div>
                    </div>

                    <div class="side-scroll">
                        <ul class="nav flex-column">
                            <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-columns nav-icon"></i><span class="nav-label">Dashboard</span></a></li>
                            <li class="nav-item"><a class="nav-link active" href="categories.html"><i class="fas fa-th-large nav-icon"></i><span class="nav-label">Categories</span></a></li>
                            <li class="nav-item"><a class="nav-link" href="products.html"><i class="fas fa-box-open nav-icon"></i><span class="nav-label">Products</span></a></li>
                            <li class="nav-item"><a class="nav-link" href="reviews.html"><i class="fas fa-star nav-icon"></i><span class="nav-label">Reviews</span></a></li>
                            <li class="nav-item"><a class="nav-link" href="orders.html"><i class="fas fa-shopping-bag nav-icon"></i><span class="nav-label">Orders</span></a></li>
                        </ul>
                    </div>

                    <div class="side-actions">
                        <a href="../index.html" class="btn btn-sm btn-outline-light btn-block mb-2"><i class="fas fa-globe"></i> <span class="nav-label">View Website</span></a>
                        <button type="button" class="btn btn-sm btn-light btn-block" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span class="nav-label">Logout</span></button>
                    </div>
                </div>
            </aside>

            <main class="main-panel">
                <h4 class="mb-1">Category Manager</h4>
                <p class="text-muted mb-3">Create and manage product categories from one place.</p>
                <div id="statusMessage" class="alert d-none" role="alert"></div>

                <div class="card-lite">
                    <h6 class="mb-3">Add New Category</h6>
                    <form id="categoryForm" novalidate>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="categoryName">Category Name *</label>
                                <input type="text" class="form-control" id="categoryName" required>
                            </div>
                            <div class="form-group col-md-6">
                                <label for="categorySlug">Slug</label>
                                <input type="text" class="form-control" id="categorySlug" placeholder="category-slug">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label for="categorySortOrder">Sort Order</label>
                                <input type="number" class="form-control" id="categorySortOrder" value="0">
                            </div>
                            <div class="form-group col-md-8">
                                <label>Category Image</label>
                                <div style="display:flex;gap:10px;align-items:flex-start;">
                                    <div style="flex:1;">
                                        <input type="file" class="form-control" id="categoryImageFile" accept="image/*" style="font-size:12px;">
                                        <small class="text-muted">Select JPG, PNG, or WebP</small>
                                        <input type="hidden" id="categoryImage">
                                        <div id="categoryImagePreview" style="margin-top:8px;display:none;">
                                            <img id="categoryImagePreviewImg" src="" alt="Preview" style="max-width:100px;max-height:100px;border-radius:8px;border:2px solid #f85606;">
                                        </div>
                                    </div>
                                    <button type="button" class="btn btn-primary" id="uploadCategoryImageBtn" style="margin-top:4px;height:fit-content;font-weight:600;">
                                        <i class="fas fa-cloud-upload-alt"></i> Upload
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea class="form-control" id="categoryDescription" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="categoryIsActive" checked>
                                <label class="form-check-label" for="categoryIsActive">Active</label>
                            </div>
                        </div>
                        <div class="d-flex flex-wrap" style="gap:8px;">
                            <button type="submit" class="btn btn-primary btn-sm" id="saveCategoryBtn">Save Category</button>
                            <button type="button" class="btn btn-secondary btn-sm d-none" id="cancelCategoryBtn">Cancel</button>
                        </div>
                    </form>
                </div>

                <div class="card-lite mb-0">
                    <h6 class="mb-3">Current Categories</h6>
                    <div class="table-responsive">
                        <table class="table table-hover table-bordered mb-0">
                            <thead class="thead-light">
                                <tr>
                                    <th>#</th>
                                    <th>Image</th>
                                    <th>Name</th>
                                    <th>Slug</th>
                                    <th>Order</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="categoryTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../frontend/lib/jquery/3.4.1/jquery.min.js"></script>
    <script src="../frontend/js/admin-store.js"></script>
    <script src="../frontend/js/admin-shell.js"></script>
    <script src="../frontend/js/admin-categories.js"></script>
</body>
</html>

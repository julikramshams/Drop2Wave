<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Reviews - Drop2Wave Admin</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../assets/logo.jpeg">
    <link href="../frontend/css/style.css" rel="stylesheet">
    <link href="../frontend/css/admin-theme.css" rel="stylesheet">
    <link href="../frontend/css/admin-pages.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid admin-shell">
        <div class="admin-layout">
            <aside class="side-nav">
                <div class="side-nav-inner">
                    <div class="side-top side-logo-wrap">
                        <img src="../assets/logo.jpeg" alt="Drop2Wave" class="side-logo">
                        <button type="button" class="sidebar-toggle d-none d-lg-inline-flex" id="sidebarToggle" aria-label="Collapse sidebar">
                            <i class="fas fa-bars"></i>
                        </button>
                    </div>

                    <div class="profile-card">
                        <div class="profile-avatar">A</div>
                        <div class="profile-text">
                            <div class="profile-name">Admin Super Admin</div>
                            <div class="profile-role">super-admin</div>
                        </div>
                    </div>

                    <div class="side-scroll">
                        <ul class="nav flex-column">
                            <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-columns nav-icon"></i><span class="nav-label">Dashboard</span></a></li>
                            <li class="nav-item"><a class="nav-link" href="categories.html"><i class="fas fa-th-large nav-icon"></i><span class="nav-label">Categories</span></a></li>
                            <li class="nav-item"><a class="nav-link" href="products.html"><i class="fas fa-box-open nav-icon"></i><span class="nav-label">Products</span></a></li>
                            <li class="nav-item"><a class="nav-link active" href="reviews.html"><i class="fas fa-star nav-icon"></i><span class="nav-label">Reviews</span></a></li>
                            <li class="nav-item"><a class="nav-link" href="orders.html"><i class="fas fa-shopping-bag nav-icon"></i><span class="nav-label">Orders</span></a></li>
                        </ul>
                    </div>

                    <div class="side-actions">
                        <a href="../index.html" class="btn btn-sm btn-outline-light btn-block mb-2"><i class="fas fa-globe"></i> <span class="nav-label">View Website</span></a>
                        <button type="button" class="btn btn-sm btn-light btn-block" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span class="nav-label">Logout</span></button>
                    </div>
                </div>
            </aside>

            <main class="main-panel">
                <h4 class="mb-1">Reviews Manager</h4>
                <p class="text-muted mb-3">Approve customer reviews and publish reviews on behalf of customers.</p>
                <div id="statusMessage" class="alert d-none" role="alert"></div>

                <div class="card-lite">
                    <h6 class="mb-3">Add Review As Admin</h6>
                    <form id="adminReviewForm" novalidate>
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label for="reviewProductId">Product *</label>
                                <select class="form-control" id="reviewProductId" required></select>
                            </div>
                            <div class="form-group col-md-4">
                                <label for="reviewAuthor">Customer Name *</label>
                                <input type="text" class="form-control" id="reviewAuthor" placeholder="e.g. Nayeem" required>
                            </div>
                            <div class="form-group col-md-4">
                                <label for="reviewRating">Rating *</label>
                                <select class="form-control" id="reviewRating" required>
                                    <option value="5">5 - Excellent</option>
                                    <option value="4">4 - Good</option>
                                    <option value="3">3 - Average</option>
                                    <option value="2">2 - Poor</option>
                                    <option value="1">1 - Bad</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="reviewText">Review Text *</label>
                            <textarea class="form-control" id="reviewText" rows="3" required></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-10">
                                <label for="reviewImageFiles">Review Images (optional)</label>
                                <input type="file" class="form-control" id="reviewImageFiles" accept="image/*" multiple style="font-size: 12px;">
                                <small class="text-muted">You can add one or multiple images.</small>
                            </div>
                            <div class="form-group col-md-2 d-flex align-items-end">
                                <button type="button" id="uploadReviewImagesBtn" class="btn btn-info btn-block"><i class="fas fa-images"></i> Upload</button>
                            </div>
                        </div>
                        <input type="hidden" id="reviewImages" value="[]">
                        <div id="reviewImagePreview" class="review-images" style="display:none;"></div>
                        <div class="mt-3">
                            <button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> Publish Review</button>
                        </div>
                    </form>
                </div>

                <div class="card-lite">
                    <h6 class="mb-3">Pending Customer Reviews <span class="badge badge-warning" id="pendingCount">0</span></h6>
                    <div id="pendingReviewsList"></div>
                </div>

                <div class="card-lite mb-0">
                    <h6 class="mb-3">Approved Reviews</h6>
                    <div id="approvedReviewsList"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="../frontend/lib/jquery/3.4.1/jquery.min.js"></script>
    <script src="../frontend/js/admin-store.js"></script>
    <script src="../frontend/js/admin-shell.js"></script>
    <script src="../frontend/js/admin-reviews.js"></script>
</body>
</html>

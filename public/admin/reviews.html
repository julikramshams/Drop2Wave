<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Reviews - Drop2Wave Admin</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../assets/logo.jpeg">
    <link href="../frontend/css/style.css" rel="stylesheet">
    <style>
        body { background: #f3f6fb; }
        .admin-shell { max-width: 1250px; margin: 24px auto; }
        .admin-layout { display: grid; grid-template-columns: 260px 1fr; gap: 16px; }
        .side-nav { background: #111827; border-radius: 14px; padding: 16px; color: #fff; min-height: 75vh; }
        .side-nav h5 { color: #fff; }
        .side-nav .nav-link { color: #e5e7eb; border-radius: 8px; margin-bottom: 6px; }
        .side-nav .nav-link.active, .side-nav .nav-link:hover { background: #f85606; color: #fff; }
        .main-panel { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 10px 22px rgba(12, 12, 12, 0.08); }
        .card-lite { border: 1px solid #eceff3; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
        .review-card { border: 1px solid #e6e9ef; border-radius: 10px; padding: 12px; margin-bottom: 12px; background: #fff; }
        .review-meta { font-size: 13px; color: #6b7280; margin-bottom: 6px; }
        .review-stars { color: #f59e0b; letter-spacing: 1px; }
        .review-images { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .review-images img { width: 62px; height: 62px; object-fit: cover; border-radius: 8px; border: 1px solid #d1d5db; }
        .badge-pending { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; }
        .badge-approved { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .badge-rejected { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        @media (max-width: 992px) {
            .admin-layout { grid-template-columns: 1fr; }
            .side-nav { min-height: auto; }
        }
    </style>
</head>
<body>
    <div class="container-fluid admin-shell">
        <div class="admin-layout">
            <aside class="side-nav">
                <h5 class="mb-3">Drop2Wave Admin</h5>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link active" href="reviews.html"><i class="fas fa-star"></i> Reviews</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html"><i class="fas fa-shopping-bag"></i> Orders</a></li>
                </ul>
                <hr style="border-color: rgba(255,255,255,.15);">
                <a href="../index.html" class="btn btn-sm btn-outline-light btn-block mb-2">View Website</a>
                <button type="button" class="btn btn-sm btn-light btn-block" id="logoutBtn">Logout</button>
            </aside>

            <main class="main-panel">
                <h4 class="mb-1">Reviews Manager</h4>
                <p class="text-muted mb-3">Approve customer reviews and publish reviews on behalf of customers.</p>
                <div id="statusMessage" class="alert d-none" role="alert"></div>

                <div class="card-lite">
                    <h6 class="mb-3">Add Review As Admin</h6>
                    <form id="adminReviewForm" novalidate>
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label for="reviewProductId">Product *</label>
                                <select class="form-control" id="reviewProductId" required></select>
                            </div>
                            <div class="form-group col-md-4">
                                <label for="reviewAuthor">Customer Name *</label>
                                <input type="text" class="form-control" id="reviewAuthor" placeholder="e.g. Nayeem" required>
                            </div>
                            <div class="form-group col-md-4">
                                <label for="reviewRating">Rating *</label>
                                <select class="form-control" id="reviewRating" required>
                                    <option value="5">5 - Excellent</option>
                                    <option value="4">4 - Good</option>
                                    <option value="3">3 - Average</option>
                                    <option value="2">2 - Poor</option>
                                    <option value="1">1 - Bad</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="reviewText">Review Text *</label>
                            <textarea class="form-control" id="reviewText" rows="3" required></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-10">
                                <label for="reviewImageFiles">Review Images (optional)</label>
                                <input type="file" class="form-control" id="reviewImageFiles" accept="image/*" multiple style="font-size: 12px;">
                                <small class="text-muted">You can add one or multiple images.</small>
                            </div>
                            <div class="form-group col-md-2 d-flex align-items-end">
                                <button type="button" id="uploadReviewImagesBtn" class="btn btn-info btn-block"><i class="fas fa-images"></i> Upload</button>
                            </div>
                        </div>
                        <input type="hidden" id="reviewImages" value="[]">
                        <div id="reviewImagePreview" class="review-images" style="display:none;"></div>
                        <div class="mt-3">
                            <button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> Publish Review</button>
                        </div>
                    </form>
                </div>

                <div class="card-lite">
                    <h6 class="mb-3">Pending Customer Reviews <span class="badge badge-warning" id="pendingCount">0</span></h6>
                    <div id="pendingReviewsList"></div>
                </div>

                <div class="card-lite mb-0">
                    <h6 class="mb-3">Approved Reviews</h6>
                    <div id="approvedReviewsList"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="../frontend/lib/jquery/3.4.1/jquery.min.js"></script>
    <script src="../frontend/js/admin-store.js"></script>
    <script src="../frontend/js/admin-reviews.js"></script>
</body>
</html>

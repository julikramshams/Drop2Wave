
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Categories - Drop2Wave</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="../frontend/css/style.css" rel="stylesheet">
    <style>
        body { background: #f3f6fb; font-family: "Poppins", sans-serif; }
        .admin-shell { max-width: 1250px; margin: 24px auto; }
        .admin-layout { display: grid; grid-template-columns: 260px 1fr; gap: 16px; }
        .side-nav { background: #111827; border-radius: 14px; padding: 16px; color: #fff; min-height: 75vh; }
        .side-nav h5 { color: #fff; }
        .side-nav .nav-link { color: #e5e7eb; border-radius: 8px; margin-bottom: 6px; }
        .side-nav .nav-link.active, .side-nav .nav-link:hover { background: #f85606; color: #fff; }
        .main-panel { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 10px 22px rgba(12, 12, 12, 0.08); }
        .card-lite { border: 1px solid #eceff3; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
        .table td, .table th { font-size: 14px; vertical-align: middle; }
        .d2w-editor-wrap { border: 1px solid #d1d5db; border-radius: 10px; background: #fff; }
        .d2w-editor-toolbar { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px; border-bottom: 1px solid #e5e7eb; background: #f9fafb; }
        .d2w-editor-btn { border: 1px solid #d1d5db; background: #fff; border-radius: 6px; padding: 4px 8px; font-size: 13px; line-height: 1; }
        .d2w-editor-size { border: 1px solid #d1d5db; border-radius: 6px; padding: 4px 6px; font-size: 13px; }
        .d2w-editor-color { width: 34px; height: 30px; border: 1px solid #d1d5db; border-radius: 6px; padding: 2px; background: #fff; }
        .d2w-editor-content { min-height: 110px; padding: 10px; outline: none; font-size: 14px; line-height: 1.5; }
        @media (max-width: 992px) {
            .admin-layout { grid-template-columns: 1fr; }
            .side-nav { min-height: auto; }
        }
    </style>
</head>
<body>
    <div class="container-fluid admin-shell">
        <div class="admin-layout">
            <aside class="side-nav">
                <h5 class="mb-3">Drop2Wave Admin</h5>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="categories.html">Categories</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html"><i class="fas fa-shopping-bag"></i> Orders</a></li>
                </ul>
                <hr style="border-color: rgba(255,255,255,.15);">
                <a href="../index.html" class="btn btn-sm btn-outline-light btn-block mb-2">View Website</a>
                <button type="button" class="btn btn-sm btn-light btn-block" id="logoutBtn">Logout</button>
            </aside>

            <main class="main-panel">
                <h4 class="mb-1">Category Manager</h4>
                <p class="text-muted mb-3">Create and manage product categories from one place.</p>
                <div id="statusMessage" class="alert d-none" role="alert"></div>

                <div class="card-lite">
                    <h6 class="mb-3">Add New Category</h6>
                    <form id="categoryForm" novalidate>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="categoryName">Category Name *</label>
                                <input type="text" class="form-control" id="categoryName" required>
                            </div>
                            <div class="form-group col-md-6">
                                <label for="categorySlug">Slug</label>
                                <input type="text" class="form-control" id="categorySlug" placeholder="category-slug">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label for="categorySortOrder">Sort Order</label>
                                <input type="number" class="form-control" id="categorySortOrder" value="0">
                            </div>
                            <div class="form-group col-md-8">
                                <label>Category Image</label>
                                <div style="display:flex;gap:10px;align-items:flex-start;">
                                    <div style="flex:1;">
                                        <input type="file" class="form-control" id="categoryImageFile" accept="image/*" style="font-size:12px;">
                                        <small class="text-muted">Select JPG, PNG, or WebP</small>
                                        <input type="hidden" id="categoryImage">
                                        <div id="categoryImagePreview" style="margin-top:8px;display:none;">
                                            <img id="categoryImagePreviewImg" src="" alt="Preview" style="max-width:100px;max-height:100px;border-radius:8px;border:2px solid #f85606;">
                                        </div>
                                    </div>
                                    <button type="button" class="btn btn-primary" id="uploadCategoryImageBtn" style="margin-top:4px;height:fit-content;font-weight:600;">
                                        <i class="fas fa-cloud-upload-alt"></i> Upload
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea class="form-control" id="categoryDescription" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="categoryIsActive" checked>
                                <label class="form-check-label" for="categoryIsActive">Active</label>
                            </div>
                        </div>
                        <div class="d-flex flex-wrap" style="gap:8px;">
                            <button type="submit" class="btn btn-primary btn-sm" id="saveCategoryBtn">Save Category</button>
                            <button type="button" class="btn btn-secondary btn-sm d-none" id="cancelCategoryBtn">Cancel</button>
                        </div>
                    </form>
                </div>

                <div class="card-lite mb-0">
                    <h6 class="mb-3">Current Categories</h6>
                    <div class="table-responsive">
                        <table class="table table-hover table-bordered mb-0">
                            <thead class="thead-light">
                                <tr>
                                    <th>#</th>
                                    <th>Image</th>
                                    <th>Name</th>
                                    <th>Slug</th>
                                    <th>Order</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="categoryTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../frontend/lib/jquery/3.4.1/jquery.min.js"></script>
    <script src="../frontend/js/admin-store.js"></script>
    <script src="../frontend/js/admin-categories.js"></script>
</body>
</html>
      </div>

      <div class="text-center pt-3">
        <p class="mb-0 d2w-copy">&copy; 2026 Drop2Wave</p>
      </div>
    </div>
  </footer>

  <script src="frontend/lib/jquery/3.4.1/jquery.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
  <script src="frontend/lib/easing/easing.min.js"></script>
  <script src="frontend/lib/owlcarousel/owl.carousel.min.js"></script>
  <script src="frontend/js/admin-store.js"></script>
  <script src="frontend/js/main.js"></script>
</body>
</html>
